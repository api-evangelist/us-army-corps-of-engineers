      - Water Infrastructure
      - Safety
      - Geospatial Data
    serviceName: USACE National Inventory of Dams API
    serviceCategory: API
  - name: USACE Open Data
    baseURL: ''
    tags:
      - Open Data
      - Federal Government
      - Geospatial Data
      - Water Resources
      - Infrastructure
    serviceName: USACE Open Data
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
