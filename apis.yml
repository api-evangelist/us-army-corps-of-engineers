    description: >-
      The Corps Water Management System Data API (CDA) is a RESTful API providing public access
      to USACE water management data. It supports retrieval of timeseries data (stream flow,
      reservoir levels, precipitation), location information, rating tables, location levels,
      reservoirs, and a full data catalog. The API supports pagination, unit conversion, and
      multiple date/time formats (ISO 8601 or epoch milliseconds). Data is publicly available
      without authentication for reading.
  - aid: us-army-corps-of-engineers:usace-national-inventory-of-dams
    name: USACE National Inventory of Dams API
