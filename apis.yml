description: >-
  The US Army Corps of Engineers is a federal agency that plays a critical role in
  managing the nation's water resources and infrastructure. They are responsible for
  building and maintaining dams, levees, and flood control systems, overseeing construction
  of ports, harbors, and waterways, and providing engineering support to military operations.
  USACE publishes open APIs including the CWMS Data API for water management timeseries data,
  the National Inventory of Dams API, and open geospatial datasets.
