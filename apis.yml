        type: SwaggerUI
      - url: https://geospatial-usace.opendata.arcgis.com/datasets/1632cb2bb23046569fbf2bc144f06764_0
        type: GISData
    description: >-
      The National Inventory of Dams (NID) API provides access to the comprehensive database of
      US dams maintained by the US Army Corps of Engineers. The database contains information on
      over 70 data fields for each dam including location, size, type, purpose, hazard classification,
      last inspection date, and owner information. The API supports searching and filtering dam records.
